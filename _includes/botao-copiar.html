<script>
function copiarTexto(botao) {
  const container = botao.closest('.container-codigo');
  const textoArea = container.querySelector('textarea');
  const aviso = container.querySelector('.feedback');

  navigator.clipboard.writeText(textoArea.value).then(() => {
    aviso.style.display = "block";
    setTimeout(() => {
      aviso.style.display = "none";
    }, 2000);
  });
}
</script>

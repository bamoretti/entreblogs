name: Gerar Feed Global

on:
  push:
    paths:
      - '_data/participantes.yml'
  workflow_dispatch:

jobs:
  gerar-feed:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependências
        run: npm install

      - name: Gerar feed global
        run: node scripts/gerar-feed-global.js

      - name: Commit e push do feed gerado
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add feed-entreblogs.xml
          git diff --staged --quiet || git commit -m "Atualiza feed global"
          git push

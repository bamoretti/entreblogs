title: Entreblogs
description: Um espaço para compartilhar perspectivas sobre os mesmos temas, cada um do seu jeitinho e no seu próprio blog.

url: "https://bamoretti.github.io"
baseurl: "/entreblogs"

markdown: kramdown

excerpt_separator: "<!--more-->"

pagination:
  enabled: true
  per_page: 9

permalink: :slug/
future: false

defaults:
  - scope:
      path: "tags"
      type: pages
    values:
      permalink: /:slug/

# ⚠️ REMOVIDO (não funciona no GitHub Pages)
# plugins:
#   - jekyll-analytics

# ⚠️ REMOVIDO (dependia do plugin)
# jekyll_analytics:
#   CounterDotDev:
#     user: "..."
#     domain: "..."

exclude:
- README.md
- LICENSE.md
